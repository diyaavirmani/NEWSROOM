<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veritas — News, grounded in truth.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Merriweather:ital,wght@0,300;0,400;1,300;1,400&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --w:#ffffff;
  --bg:#fbfbf9;
  --ink:#1a1a1a;
  --ink2:#2e2e2e;
  --ink3:#5a5a5a;
  --ink4:#888;
  --red:#be131a;
  --red2:#9c0d12;
  --border:#e8e8e8;
  --border2:#f0f0f0;
  --disp:'Playfair Display',Georgia,serif;
  --body:'Merriweather',Georgia,serif;
  --sans:'Source Sans 3',system-ui,sans-serif;
}
html{font-size:14px; background: #e0e0e0;}
body{
  background: var(--w); 
  color: var(--ink);
  font-family: var(--sans);
  line-height: 1.5;
  overflow-x: hidden;
  max-width: 1400px;
  margin: 0 auto;
  box-shadow: 0 0 20px rgba(0,0,0,0.1);
  min-height: 100vh;
}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:var(--sans);}

/* ── MASTHEAD ── */
.masthead {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 30px 40px;
  background: var(--w);
  border-bottom: 1px solid var(--border);
}
.mh-left, .mh-right { flex: 1; }
.mh-right { display: flex; justify-content: flex-end; }
.mh-center { display: flex; flex-direction: column; align-items: center; text-align: center; }

.mh-title {
  font-family: var(--disp);
  font-size: 64px;
  font-weight: 900;
  letter-spacing: -2px;
  color: var(--ink);
  line-height: 1;
  margin-bottom: 8px;
}
.mh-subtitle {
  font-family: var(--body);
  font-size: 15px;
  font-style: italic;
  color: #777;
  letter-spacing: 0.5px;
}
.v-small {
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 700;
  color: var(--ink2);
  margin-bottom: 4px;
}
.d-small {
  font-family: var(--sans);
  font-size: 12px;
  color: var(--ink4);
}
.md-btn {
  background: var(--w);
  border: 1px solid #ccc;
  padding: 8px 16px;
  font-size: 13px;
  color: var(--ink);
  transition: background 0.2s;
}
.md-btn:hover { background: #f5f5f5; }

/* ── NAV ── */
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 40px;
  border-bottom: 1px solid #e0e0e0;
  background: var(--w);
}
.nav-links { display: flex; border-bottom: none; }
.nav-item {
  padding: 16px 18px 16px;
  font-family: var(--sans);
  font-size: 15px;
  font-weight: 600;
  color: #444;
  border: none;
  background: none;
  position: relative;
  transition: color 0.2s;
  border-bottom: 3px solid transparent;
}
.nav-item:hover { color: var(--red); }
.nav-item.active { 
  color: var(--red); 
  border-bottom: 3px solid var(--red); 
  padding-bottom: 13px; 
}

.nav-search { display: flex; align-items: center; margin: 8px 0; }
.nav-search input {
  padding: 9px 14px;
  border: 1px solid #ccc;
  border-right: none;
  background: #fafafa;
  font-family: var(--body);
  font-style: italic;
  font-size: 13px;
  width: 280px;
  outline: none;
  color: var(--ink);
}
.nav-search input:focus { border-color: #999; background: #fff; }
.nav-search button {
  padding: 9px 20px;
  background: #a31118;
  color: #fff;
  border: none;
  border: 1px solid #a31118;
  font-size: 16px;
  font-weight: 700;
  transition: background 0.2s;
}
.nav-search button:hover { background: #820e13; }

/* ── MAIN LAYOUT ── */
.page {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 30px;
  padding: 30px 40px 60px;
  background: var(--bg);
}
main { min-width: 0; }

/* ── CONTENT HEADER ── */
.sh {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--sans);
  font-size: 16px;
  font-weight: 700;
  color: var(--red);
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.sh-r {
  font-size: 12px;
  font-weight: 600;
  color: var(--ink4);
  cursor: pointer;
}
.sh-r:hover { color: var(--red); }

/* ── HERO & SUB ARTICLES ── */
.top-news-area {
  display: grid;
  grid-template-columns: 1.4fr 1fr;
  gap: 24px;
}

/* ── HERO CARD ── */
.hero-card { cursor: pointer; }
.hero-card:hover .h-hl { color: var(--red); }
.hero-img {
  width: 100%;
  aspect-ratio: 16/9;
  object-fit: cover;
  margin-bottom: 16px;
  transition: filter 0.3s;
}
.hero-card:hover .hero-img { filter: saturate(1.1) contrast(1.05); }
.h-sec {
  font-size: 11px;
  font-weight: 700;
  color: var(--red);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.h-hl {
  font-family: var(--disp);
  font-size: 28px;
  font-weight: 700;
  line-height: 1.2;
  color: var(--ink);
  margin-bottom: 12px;
  transition: color 0.2s;
}
.h-dek {
  font-family: var(--body);
  font-size: 14px;
  line-height: 1.6;
  color: var(--ink3);
  margin-bottom: 14px;
  font-style: italic;
}
.meta {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--sans);
  font-size: 11px;
  color: var(--ink4);
}
.badge {
  background: #edf7f3;
  color: #1a6b3a;
  padding: 3px 6px;
  font-weight: 700;
  font-size: 10px;
}

/* ── SUB ARTICLES GRID ── */
.sub-articles {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.sub-card {
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.sub-card:last-child { border-bottom: none; }
.sub-card:hover .s-hl { color: var(--red); }
.s-sec {
  font-size: 10px;
  font-weight: 700;
  color: var(--red);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.s-hl {
  font-family: var(--disp);
  font-size: 18px;
  font-weight: 700;
  line-height: 1.25;
  color: var(--ink);
  margin-bottom: 10px;
  transition: color 0.2s;
}

/* ── SIDEBAR ── */
.sidebar {
  border-left: 1px solid #ddd;
  padding-left: 30px;
}
.sb-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: var(--sans);
  font-size: 12px;
  font-weight: 700;
  color: var(--ink);
  padding-bottom: 12px;
  border-bottom: 2px solid var(--ink);
  margin-bottom: 16px;
}
.sb-header span { color: var(--ink4); font-weight: 400; font-size: 11px; }

.lat-list { display: flex; flex-direction: column; gap: 16px; }
.lat-card { cursor: pointer; border-bottom: 1px solid var(--border); padding-bottom: 16px;}
.lat-card:last-child { border-bottom: none; }
.lat-card:hover .lat-hl { color: var(--red); }
.lat-tag {
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 700;
  color: var(--red);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.lat-hl {
  font-family: var(--body);
  font-size: 14px;
  line-height: 1.5;
  color: var(--ink2);
  transition: color 0.2s;
  margin-bottom: 6px;
}
.lat-date {
  font-family: var(--sans);
  font-size: 11px;
  font-weight: 700;
  color: var(--red);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.lat-pdate { font-family:var(--sans); font-size:11px; color:#aaa; margin-left:6px; }

/* ── MODAL ── */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.76);z-index:999;overflow-y:auto;padding:24px 14px;}
.mbg.on{display:flex;align-items:flex-start;justify-content:center;}
.modal{background:var(--w);max-width:740px;width:100%;border-top:4px solid var(--red);animation:mIn .3s cubic-bezier(0.175, 0.885, 0.32, 1.275);}
@keyframes mIn{from{opacity:0;transform:translateY(20px) scale(0.98)}to{opacity:1;transform:translateY(0) scale(1)}}
.mbar{display:flex;justify-content:space-between;align-items:center;padding:10px 24px;border-bottom:1px solid var(--border);background:#fafafa;}
.mbar-l{font-family:var(--sans);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink3);font-weight:700;}
.mclose{font-family:var(--sans);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;background:none;border:1px solid #ccc;color:#333;cursor:pointer;transition:all .2s;}
.mclose:hover{background:var(--red);color:#fff;border-color:var(--red);}
.mcontent{padding:30px 40px;}
.mtag{font-family:var(--sans);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--red);margin-bottom:12px;}
.mhl{font-family:var(--disp);font-size:36px;font-weight:700;line-height:1.2;color:var(--ink);margin-bottom:16px;}
.mdek{font-family:var(--body);font-size:15px;font-style:italic;line-height:1.7;color:var(--ink3);border-left:3px solid var(--red);padding-left:16px;margin-bottom:20px;}
.m-img{width:100%;max-height:400px;object-fit:cover;display:block;margin-bottom:20px;}
.mby{font-family:var(--sans);font-size:12px;color:var(--ink4);display:flex;gap:14px;align-items:center;padding-bottom:16px;border-bottom:1px solid var(--border);margin-bottom:24px;}
.mby strong{color:var(--ink);}
.mbody{font-family:var(--body);font-size:16px;line-height:1.8;color:#222;}
.mbody p{margin-bottom:18px;}
.mbody p:first-child::first-letter{font-family:var(--disp);font-size:60px;font-weight:900;float:left;line-height:.8;margin-right:8px;margin-top:8px;}

/* QA Chat Widget */
.qa-hint{font-family:var(--body);font-style:italic;font-size:12px;color:var(--ink3);line-height:1.55;margin-bottom:12px;margin-top:40px;}
.qa-msgs{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.qm{font-family:var(--sans);font-size:13px;line-height:1.5;padding:8px 12px;border-left:2px solid var(--border);color:var(--ink2);background:#fafafa;}
.qm.u{border-left-color:var(--red);background:#fff5f5;font-style:italic;}
.qa-row{display:flex;}
.qa-inp{flex:1;font-family:var(--body);font-style:italic;font-size:13px;padding:10px 14px;border:1px solid var(--border);border-right:none;background:var(--w);outline:none;}
.qa-inp:focus{border-color:#333;}
.qa-go{font-weight:700;padding:10px 16px;background:var(--ink);color:#fff;border:none;transition:background .2s;}
.qa-go:hover{background:var(--red);}

/* Loading Bar */
.lbar{height:2px;background:#f0f0f0;overflow:hidden;}
.lfill{height:100%;width:30%;background:var(--red);display:none;animation:ls 1.2s ease infinite;}
.lbar.on .lfill{display:block;}
@keyframes ls{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}

/* Notice */
.notice{display:none;background:#fbf9eb;border-bottom:1px solid #e8e4d1;padding:10px 40px;font-size:13px;color:#5c5636;align-items:center;gap:12px;}
.notice.show{display:flex;}
.ns{width:14px;height:14px;border:2px solid #e8e4d1;border-top-color:var(--red);border-radius:50%;animation:sp .8s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="masthead">
  <div class="mh-left">
    <div class="v-small">Veritas</div>
    <div class="d-small" id="mhDate">06 Apr 2026 10:04 pm</div>
  </div>
  <div class="mh-center">
    <div class="mh-title">Veritas</div>
    <div class="mh-subtitle">News, grounded in truth.</div>
  </div>
  <div class="mh-right">
    <button class="md-btn" onclick="toggleDigest()">Morning Digest</button>
  </div>
</div>

<div class="nav">
  <div class="nav-links">
    <button class="nav-item active" onclick="ff('all',this)">Top News</button>
    <button class="nav-item" onclick="ff('india',this)">India</button>
    <button class="nav-item" onclick="ff('world',this)">World</button>
    <button class="nav-item" onclick="ff('economy',this)">Economy</button>
    <button class="nav-item" onclick="ff('technology',this)">Technology</button>
    <button class="nav-item" onclick="ff('ai',this)">AI</button>
    <button class="nav-item" onclick="ff('science',this)">Science</button>
    <button class="nav-item" onclick="ff('web3',this)">Web3</button>
  </div>
  <div class="nav-search">
    <input type="text" id="ncInp" placeholder="Commission a report on any topic..." onkeydown="if(event.key==='Enter')gen()">
    <button onclick="gen()">→</button>
  </div>
</div>

<div class="lbar" id="lbar"><div class="lfill"></div></div>
<div class="notice" id="notice"><span class="ns" id="nSp"></span><span id="nTx">Researching…</span></div>

<div class="page">
  <main>
    <div class="sh">
      <span>Top News</span>
      <span class="sh-r" onclick="loadFeed()">Refresh →</span>
    </div>
    
    <div id="topNewsArea" class="top-news-area">
       <!-- Hero and Sub Articles placed here -->
    </div>
  </main>
  
  <aside class="sidebar">
    <div class="sb-header">
      Latest Reports <span id="artCount">0 articles</span>
    </div>
    <div class="lat-list" id="latList">
      <!-- Latest items loaded here -->
    </div>
  </aside>
</div>

<!-- ── MODAL ── -->
<div class="mbg" id="mbg" onclick="closeBg(event)">
  <div class="modal">
    <div class="mbar"><span class="mbar-l">Veritas · Full Report</span><button class="mclose" onclick="closeModal()">✕ Close</button></div>
    <div class="mcontent">
      <div class="mtag" id="mtag"></div>
      <div class="mhl" id="mhl"></div>
      <img class="m-img" id="mImg" src="" alt="" style="display:none;" onerror="this.style.display='none'">
      <div class="mdek" id="mdek" style="display:none;"></div>
      <div class="mby"><strong>Veritas AI Bureau</strong><span id="mdate"></span><span id="mconf"></span></div>
      <div class="mbody" id="mbody"></div>
      
      <div class="qa-hint">Ask a follow-up question below, directly to our AI Journalist covering this piece.</div>
      <div class="qa-msgs" id="mqMsgs"></div>
      <div class="qa-row">
        <input class="qa-inp" id="mqInp" placeholder="Why does this matter? What happens next?" onkeydown="if(event.key==='Enter')askModal()">
        <button class="qa-go" onclick="askModal()">Ask →</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = (window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1')
  ? 'http://localhost:5000'
  : 'https://newsroom-dlwe.onrender.com';

const DEMO_ARTICLES = [
  {
    id: "demo_1",
    sector: "Technology",
    headline: "India's Semiconductor Mission Enters Critical Phase as ISMC Fab Faces Third Delay",
    dek: "The Karnataka facility — once positioned as the anchor of India's chip ambitions — still lacks a confirmed technology partner two years after its initial proposal. Stakeholders warn that further delays may impact the broader ecosystem's growth.",
    confidence: 0.95,
    timestamp: "2026-04-06T10:04:00Z",
    image_url: "https://images.unsplash.com/photo-1518770660439-4636190af475?ixlib=rb-4.0.3&auto=format&fit=crop&w=1600&q=80",
    body: "The overarching vision of establishing domestic semiconductor manufacturing capabilities in India faces a new test. Sources close to the ISMC consortium indicate that their proposed fab in Karnataka is evaluating new technology partners, extending the project's timeline.\\n\\nAnalysts believe this pause is necessary to secure advanced node technology."
  },
  {
    id: "demo_2",
    sector: "Economy",
    headline: "RBI Holds Rates Steady as Retail Inflation Softens to 4.9%, Food Prices Remain a Concern",
    confidence: 0.88,
    timestamp: "2026-04-06T09:00:00Z"
  },
  {
    id: "demo_3",
    sector: "World",
    headline: "India and Pakistan Resume Back-Channel Diplomatic Contact After 14-Month Freeze",
    confidence: 0.85,
    timestamp: "2026-04-06T08:30:00Z"
  },
  {
    id: "demo_4",
    sector: "AI",
    headline: "OpenAI Releases o3 to General Users; Benchmark Performance Sparks Evaluation Methodology Debate",
    confidence: 0.94,
    timestamp: "2026-04-06T08:00:00Z"
  },
  {
    id: "demo_5",
    sector: "India",
    headline: "Delhi's Water Table Falls to Record Low as City Adds 300,000 New Residents Annually",
    confidence: 0.82,
    timestamp: "2026-04-06T07:15:00Z"
  },
  {
    id: "demo_6",
    sector: "Science",
    headline: "ISRO's Gaganyaan Mission Completes Final Crew Module Test; Human Spaceflight Targeted for Q4 2026",
    confidence: 0.98,
    timestamp: "2026-04-06T06:00:00Z"
  }
];

let articles=[], filt='all', current=null;

document.addEventListener('DOMContentLoaded',()=>{
  setDates(); 
  loadFeed(); 
  setInterval(loadFeed, 60*1000);
});

function setDates(){
  const n=new Date();
  document.getElementById('mhDate').textContent=n.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'})+' '+n.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true});
}

function showN(msg,err=false){
  const n=document.getElementById('notice'),sp=document.getElementById('nSp'),tx=document.getElementById('nTx');
  n.classList.add('show');sp.style.display=err?'none':'block';tx.style.color=err?'#be131a':'#5c5636';tx.textContent=msg;
}
function hideN(){document.getElementById('notice').classList.remove('show');}

async function loadFeed(){
  try{
    const r=await fetch(`${API}/articles`,{signal:AbortSignal.timeout(8000)});
    if(r.ok){
      const d=await r.json();
      if(d.articles&&d.articles.length>0) {
        articles=d.articles;
      } else {
        articles=DEMO_ARTICLES;
      }
    } else {
      articles=DEMO_ARTICLES;
    }
  }catch(e){
    console.log('Error',e);
    articles=DEMO_ARTICLES;
  }
  renderAll();
}

function renderAll(){
  const f=filt==='all'?articles:articles.filter(a=>(a.sector||'').toLowerCase().includes(filt));
  const tna = document.getElementById('topNewsArea');
  const lat = document.getElementById('latList');
  document.getElementById('artCount').textContent=f.length+' articles';
  
  if(!f.length){
    tna.innerHTML='<p>No articles found.</p>';
    lat.innerHTML='';
    return;
  }
  
  // Hero (First article)
  const lead = f[0];
  const subs = f.slice(1,7);
  
  let subHtml = '';
  if(subs.length > 0){
    subHtml = `<div class="sub-articles">
      ${subs.map(a => `
        <div class="sub-card" onclick="openArt('${a.id}')">
           <div class="s-sec">${x(a.sector||'Report')}</div>
           <div class="s-hl">${x(a.headline)}</div>
           <div class="meta"><span class="badge">${badge(a.confidence)}%</span><span>${dt(a.timestamp)}</span></div>
        </div>
      `).join('')}
    </div>`;
  }
  
  tna.innerHTML = `
    <div class="hero-card" onclick="openArt('${lead.id}')">
      ${lead.image_url ? `<img src="${lead.image_url}" class="hero-img">` : ``}
      <div class="h-sec">${x(lead.sector||'Report')}</div>
      <div class="h-hl">${x(lead.headline)}</div>
      <div class="h-dek">${x((lead.dek||lead.body||'').slice(0, 160))}...</div>
      <div class="meta"><span class="badge">${badge(lead.confidence)}%</span><span>${dt(lead.timestamp)}</span></div>
    </div>
    ${subHtml}
  `;
  
  // Sidebar (Latest)
  lat.innerHTML = f.map((a, i) => `
    <div class="lat-card" onclick="openArt('${a.id}')">
      <div class="lat-tag">${i===0?'LATEST':dtFull(a.timestamp)}</div>
      <div class="lat-hl">${x(a.headline)}</div>
    </div>
  `).join('');
}

async function gen(){
  const t=document.getElementById('ncInp').value.trim();
  if(!t)return;
  document.getElementById('lbar').classList.add('on');
  showN(`Researching "${t.slice(0,40)}"…`);
  try{
    const r=await fetch(`${API}/generate`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({topic:t})});
    const a=await r.json(); 
    articles.unshift(a); 
    document.getElementById('ncInp').value=''; 
    renderAll(); 
    hideN();
  }catch(e){
    showN('Error generating article',true); 
    setTimeout(hideN,3000);
  }
  document.getElementById('lbar').classList.remove('on');
}

function openArt(id){
  const a=articles.find(z=>String(z.id)===String(id)); if(!a)return; current=a;
  document.getElementById('mtag').textContent=(a.sector||'Report').toUpperCase()+' · VERITAS';
  document.getElementById('mhl').textContent=a.headline||'—';
  
  const dk=document.getElementById('mdek'); 
  if(a.dek){dk.textContent=a.dek; dk.style.display='block';} else{dk.style.display='none';}
  
  const mi=document.getElementById('mImg'); 
  if(a.image_url){mi.src=a.image_url; mi.style.display='block';} else{mi.style.display='none';}
  
  document.getElementById('mdate').textContent=dtFull(a.timestamp);
  
  const paras=(a.body||'Loading...').split('\n').filter(p=>p.trim());
  document.getElementById('mbody').innerHTML=paras.map(p=>`<p>${p}</p>`).join('');
  document.getElementById('mqMsgs').innerHTML='';
  
  document.getElementById('mbg').classList.add('on');
  document.body.style.overflow='hidden';
}

function closeModal(){document.getElementById('mbg').classList.remove('on');document.body.style.overflow='';}
function closeBg(e){if(e.target===document.getElementById('mbg'))closeModal();}

async function askModal(){
  const q=document.getElementById('mqInp').value.trim(); if(!q)return;
  const c=document.getElementById('mqMsgs'); addMsg(c,q,'u'); document.getElementById('mqInp').value='';
  const ld=document.createElement('div');ld.className='qm';ld.textContent='Thinking…';c.appendChild(ld);
  try{
    const r=await fetch(`${API}/qa`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q,article_id:current?.id||null})});
    const d=await r.json(); ld.remove(); addMsg(c,r.ok?(d.answer||'No answer.'):(d.detail||`Error`),'ai');
  }catch{ld.remove();addMsg(c,'Offline.','ai');}
}

function addMsg(c,t,type){
  const d=document.createElement('div');
  d.className=type==='u'?'qm u':'qm';
  d.textContent=t;
  c.appendChild(d);
  c.scrollTop=c.scrollHeight;
}

function ff(s,b){
  filt=s;
  document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  renderAll();
}

function badge(c){return Math.round((c||0.85)*100);}
function dt(ts){return ts?new Date(ts).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'Today';}
function dtFull(ts){
  if(!ts)return 'Today';
  const d=new Date(ts);
  return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}).toUpperCase();
}
function x(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

</script>
