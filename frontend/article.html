<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE DISPATCH — Article</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="page-shell article-page" id="article-root">
    <a href="/" class="button secondary" style="margin-bottom: 1.5rem;">← Back to feed</a>
    <header>
      <p class="label">THE DISPATCH</p>
      <h1 id="articleHeadline">Loading…</h1>
      <p class="dek" id="articleDek"></p>
      <p class="byline" id="articleByline"></p>
    </header>

    <article class="body" id="articleBody"></article>

    <section class="source-panel" id="sourcePanel">
      <h3>Source transparency</h3>
      <ul id="sourceList"></ul>
    </section>

    <section class="qa-panel">
      <h3>Ask about this article</h3>
      <textarea id="questionInput" placeholder="Type your question here"></textarea>
      <div class="qa-controls">
        <button id="askButton" class="button primary">Ask</button>
        <div id="qaStatus" class="status"></div>
      </div>
      <ul id="chatLog" class="chat-log"></ul>
    </section>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
